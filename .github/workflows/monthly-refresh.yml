name: Monthly Schema Refresh
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update all file timestamps
        run: |
          find . -name '*.json' -not -path './.github/*' -exec touch {} \;
          find . -name '*.html' -exec touch {} \;

      - name: Update dateModified in all schema files
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          for dir in faqs help services webpages personnel; do
            if [ -d "$dir" ]; then
              for file in $dir/*.json; do
                if [ -f "$file" ]; then
                  if command -v jq &> /dev/null; then
                    jq --arg time "$TIMESTAMP" '.dateModified = $time' "$file" > temp.json && mv temp.json "$file"
                  else
                    sed -i "s/\"dateModified\":.*/\"dateModified\": \"$TIMESTAMP\",/" "$file" 2>/dev/null || true
                  fi
                fi
              done
            fi
          done

      - name: Regenerate sitemap.xml with current lastmod
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "sitemap.xml" ]; then
            sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
          fi

      - name: Update index.html timestamp and badge
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "index.html" ]; then
            sed -i "s|Last updated: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}|Last updated: $TODAY|g" index.html
          fi

      - name: Update all schema HTML pages timestamps
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          find . -name '*.html' -not -name 'index.html' | while read file; do
            sed -i "s|Last updated: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}|Last updated: $TODAY|g" "$file"
          done

      - name: Commit monthly refresh
        run: |
          git config user.name 'Schema Monster'
          git config user.email 'noreply@schema.monster'
          git add -A
          git diff --staged --quiet || (git commit -m '📅 Monthly schema refresh - LawyersAISEO - '$(date +%B\ %Y) && git push)

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://AIOVisibilityHub.github.io/lawyersaiseo-ai-schemas-ab6i/sitemap.xml" || true
          echo "✅ Pinged Google with updated sitemap"

      - name: Bing IndexNow API submission
        run: |
          # Collect all changed URLs for IndexNow
          URLS=()
          for dir in faqs help services webpages personnel; do
            if [ -d "$dir" ]; then
              for file in $dir/*.html; do
                if [ -f "$file" ]; then
                  URLS+=("https://AIOVisibilityHub.github.io/lawyersaiseo-ai-schemas-ab6i/$file")
                fi
              done
            fi
          done
          URLS+=("https://AIOVisibilityHub.github.io/lawyersaiseo-ai-schemas-ab6i/")
          URLS+=("https://AIOVisibilityHub.github.io/lawyersaiseo-ai-schemas-ab6i/sitemap.xml")

          # IndexNow accepts up to 10,000 URLs per batch
          TOTAL=${#URLS[@]}
          echo "📡 Submitting $TOTAL URLs to Bing IndexNow..."

          # Use the host as the key (IndexNow allows any key)
          INDEXNOW_KEY="AIOVisibilityHub.github.io"

          # Submit in batches of 9000
          BATCH_SIZE=9000
          for ((i=0; i<TOTAL; i+=BATCH_SIZE)); do
            BATCH=("${URLS[@]:i:BATCH_SIZE}")
            URL_LIST=$(printf ',"%s"' "${BATCH[@]}")
            URL_LIST="[${URL_LIST:1}]"

            curl -s -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json" \
              -d "{
                \"host\": \"AIOVisibilityHub.github.io\",
                \"key\": \"$INDEXNOW_KEY\",
                \"urlList\": $URL_LIST
              }" || true

            echo "✅ Submitted batch of ${#BATCH[@]} URLs to IndexNow (Bing + partners)"
          done

      - name: Ping Bing sitemap (legacy fallback)
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://AIOVisibilityHub.github.io/lawyersaiseo-ai-schemas-ab6i/sitemap.xml" || true
          echo "✅ Pinged Bing sitemap endpoint as fallback"
